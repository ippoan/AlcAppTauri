name: CI

on:
  push:
    branches: [main]
    # dev release は main push CI 内 (release-dev job) で完結するため、
    # dev-* tag trigger は削除。v* tag は tag-release.yml (workflow_dispatch) 由来。
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    # ready_for_review を明示追加。default types (opened/synchronize/reopened) には
    # 含まれず、draft → ready 切替後に CI が再走せず auto-merge が skipped まま
    # 残る事故の再発防止 (PR #3 で実例)。
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Windows: fmt + tauri build (NSIS)。clippy/test は Bazel Linux job に委譲。
  build:
    runs-on: windows-latest
    permissions:
      contents: read # PR run (untrusted) では最小権限。Release upload は分離 job で行う。
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo workspace は repo root。target/ も root 直下。
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm install

      - name: Format check
        run: cargo fmt --check

      # tauri.conf.json の version は git tracked では固定 "0.1.0" だが、
      # tauri-plugin-updater は installed version と endpoint 上の version を
      # semver 比較するため、build 時に **tag 由来の semver に置換**する。
      # dev-N (main push CI 内で採番される予定の tag 名) → "0.0.<N>"、
      # v1.2.3 (workflow_dispatch tag-release) → "1.2.3"。
      # PR/push で tag が未確定な段階では 0.0.<run_number> を暫定 version として使う
      # (現行 run に紐づく uniqueness だけあればよく、release-dev job 側で
      # 実 tag と一致する latest.json を後付けで生成する)。
      - name: Compute + patch tauri.conf.json version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/dev-* ]]; then
            V="0.0.${GITHUB_REF_NAME#dev-}"
          else
            V="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "patched tauri.conf.json version -> $V"
          node -e "const f='src-tauri/tauri.conf.json';const c=require('fs').readFileSync(f,'utf8');const j=JSON.parse(c);j.version='${V}';require('fs').writeFileSync(f, JSON.stringify(j,null,2)+'\n');"

      # tauri-plugin-updater が有効な build では TAURI_SIGNING_PRIVATE_KEY が
      # 無いと tauri build が fail する。key 未投入 (初回セットアップ前) でも
      # PR CI が回るよう、secret が空なら **updater を無効化した config** を
      # build 時にオーバーライドする (tauri.conf.json は git 上を触らない)。
      - name: Build Tauri bundle (NSIS, signed if key present)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY が未設定。updater を無効化した config で build する (署名成果物は出ない)"
            node -e "const f='src-tauri/tauri.conf.json';const j=JSON.parse(require('fs').readFileSync(f,'utf8'));j.bundle.createUpdaterArtifacts=false;delete j.plugins.updater;require('fs').writeFileSync(f, JSON.stringify(j,null,2)+'\n');"
          fi
          npm run build

      # workspace 化以降 target/ は repo root。旧 src-tauri/target/... path で
      # 探して "warn" していた bug の再発防止として "error" 化 (無音失敗禁止)。
      - name: Upload installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: alcapp-nsis
          # NSIS + updater artifact (.zip / .zip.sig) が生成された場合はまとめて
          # 拾う。updater artifact が無くても NSIS は必ずあるので if-no-files-found
          # は NSIS を対象にした loud fail のままで良い。
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # Linux Bazel: rust-only lint/test を target 単位で並列実行。
  # 過去の Tauri × Bazel probe 知見は git 履歴参照 (Probe A/B/C/D は
  # tauri.conf.json + build.rs + cargo:dev instruction で頓挫、
  # Tauri issue #12367 で非 cargo build system は未サポート)。
  bazel-parallel-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_BAZEL_REPIN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: "alcapptauri-bazel-probe"
          external-cache: true
          repository-cache: true

      - name: Generate Cargo.lock (crate_universe input)
        run: cargo generate-lockfile

      - name: "bazel test //crates/alc-config/... (3 target 並列)"
        id: bazel_test
        run: |
          bazel test //crates/alc-config/... \
            --test_output=errors \
            --test_summary=short \
            --verbose_failures

      - name: "bazel build --config=clippy (rust_clippy_aspect で並列適用)"
        id: bazel_clippy
        run: |
          bazel build --config=clippy //crates/alc-config/... \
            --verbose_failures

      - name: 結果サマリ
        if: always()
        run: |
          {
            echo "## Bazel 並列 test + clippy (crates/alc-config)"
            echo ""
            echo "- bazel test (3 rust_test target 並列): ${{ steps.bazel_test.outcome }}"
            echo "- bazel build --config=clippy (rust_clippy_aspect): ${{ steps.bazel_clippy.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Windows build と Linux bazel test/clippy の両方が green になったら
  # squash merge を queue する。片方 fail なら auto-merge は走らない。
  auto-merge:
    needs: [build, bazel-parallel-test]
    if: github.event_name == 'pull_request'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    secrets: inherit

  # PR push (非 draft) と main push の両方で dev-N tag を採番し prerelease Release
  # を作る (AlcoholChecker Android release.yml と同型)。実機 (Phase 0 検証) は
  # merge 前の PR 段階で試したい ため、PR で dev build が生成されないと Phase 0 が
  # 回らない。 draft PR は skip (dev-N 番号の浪費を防ぐ)。同一 run 内で build →
  # tag 採番 → Release upload まで完結する (Windows build 1 回)。
  release-dev:
    needs: [build, bazel-parallel-test]
    # public repo なので fork PR は排除。head.repo.full_name == github.repository で
    # same-repo (org member) の PR のみに release-dev を絞る (fork PR で
    # 悪意ある build.rs → NSIS payload → prerelease auto-publish の Pwn Request
    # 経路を封じる)。fork PR は build job (permissions: contents: read) のみ走る。
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.draft != true &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # PR / main push の commit が .github/workflows/* を触ると GITHUB_TOKEN の
      # tag push が「refusing to allow a GitHub App to create or update workflow
      # <path> without `workflows` permission」で reject される (Refs #7 で実測)。
      # ci-workflows の auto-merge と同じく App token (CI_APP_ID/CI_APP_PRIVATE_KEY)
      # を mint して push / release create に使う。CI_APP_ID が空だと fail-loud。
      - name: Mint GitHub App installation token (required)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      # PR 時は merge ref (detached) ではなく実在する PR head の commit を checkout
      # する (tag は branch に到達可能な commit に付けたい)。App token で checkout
      # することで以降の `git push` も同じ token を使う (extraheader に設定される)。
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ steps.app-token.outputs.token }}

      # dev-N tag を race-safe に採番。既存 dev-* の最大 N を取り +1、
      # push 失敗 (tag 衝突) なら次番号で最大 3 回リトライ。App token で押すため
      # workflow を含む commit の tag push も通る。GitHub App が push した tag は
      # 他 workflow を trigger しない (chain trigger 不要のため OK)。
      - name: Compute + push next dev-N tag (race-safe)
        id: dev_tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags --force
            LAST=$(git tag -l 'dev-*' | grep -oE 'dev-[0-9]+$' | sed 's/dev-//' | sort -n | tail -1 || true)
            NEXT=$(( ${LAST:-0} + 1 ))
            TAG="dev-$NEXT"
            echo "attempt $attempt: trying $TAG"
            if git tag "$TAG" && git push origin "$TAG"; then
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "created: $TAG"
              exit 0
            fi
            git tag -d "$TAG" 2>/dev/null || true
            sleep 2
          done
          echo "failed to create dev tag after 3 attempts"
          exit 1

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: alcapp-nsis
          path: nsis

      # tauri build は tauri.conf.json の version (固定 "0.1.0") から生成するため
      # 実ファイル名が `AlcApp_0.1.0_x64-setup.exe` に固定される。tag 名を含めた
      # 名前に rename して GitHub Release の asset として区別可能にする。
      - name: Rename NSIS with dev tag
        env:
          TAG: ${{ steps.dev_tag.outputs.tag }}
        run: |
          set -euo pipefail
          cd nsis
          for f in *.exe; do
            new="${f/_0.1.0_/_${TAG}_}"
            mv "$f" "$new"
            echo "renamed: $f -> $new"
          done

      # tauri-plugin-updater の latest.json (endpoint に置く schema) を組み立てる。
      # .exe.sig (署名) が build job から降りてきていれば updater 有効、無ければ
      # skip する。fail-open (updater 未設定でも Release 自体は出す)。
      - name: Build latest.json (if signing artifact present)
        id: latest_json
        env:
          TAG: ${{ steps.dev_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          SIG_FILE=$(ls nsis/*.exe.sig 2>/dev/null | head -1 || true)
          if [ -z "$SIG_FILE" ]; then
            echo "no .sig — updater disabled build; skip latest.json"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXE_FILE=$(ls nsis/*.exe | head -1)
          EXE_URL="https://github.com/ippoan/AlcAppTauri/releases/download/${TAG}/$(basename "$EXE_FILE")"
          SIG_CONTENT=$(cat "$SIG_FILE")
          # dev-N → 0.0.N (build job の version と揃える)
          VER="0.0.${TAG#dev-}"
          NOTES="AlcApp ${TAG} (auto-generated latest.json)"
          PUBDATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg version "$VER" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUBDATE" \
            --arg url "$EXE_URL" \
            --arg sig "$SIG_CONTENT" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $sig, url: $url }
              }
            }' > nsis/latest.json
          echo "generated=true" >> "$GITHUB_OUTPUT"
          cat nsis/latest.json

      - name: Create prerelease with NSIS
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.dev_tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            nsis/*.exe
            nsis/*.exe.sig
            nsis/latest.json
          # App token を使い、GITHUB_TOKEN 経路を避ける (作成者が GitHub App に
          # 統一され、chain trigger 抑止も一貫)。
          token: ${{ steps.app-token.outputs.token }}

      # dev channel の "latest" URL を安定させるため、`dev-current` tag/Release を
      # 毎回 上書きする (GitHub に "latest prerelease" alias が無いため moving
      # tag で代用)。app 側の updater endpoint は
      #   https://github.com/ippoan/AlcAppTauri/releases/download/dev-current/latest.json
      # を見ている。latest.json 未生成 (updater 未有効化) 時は skip。
      - name: Update dev-current moving tag/Release
        if: steps.latest_json.outputs.generated == 'true'
        env:
          TAG: ${{ steps.dev_tag.outputs.tag }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          # 既存の dev-current tag/Release を消してから作り直す。
          curl -sS -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/ippoan/AlcAppTauri/releases/tags/dev-current" || true
          git push --delete origin dev-current 2>/dev/null || true
          git tag -f dev-current
          git push origin dev-current --force
      - name: Create dev-current Release (mirror of latest dev-N)
        if: steps.latest_json.outputs.generated == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-current
          name: "dev-current (moving alias)"
          prerelease: true
          body: "Auto-updated moving alias to ${{ steps.dev_tag.outputs.tag }}. Used by tauri-plugin-updater endpoint."
          files: |
            nsis/*.exe
            nsis/*.exe.sig
            nsis/latest.json
          token: ${{ steps.app-token.outputs.token }}

  # v* tag push (tag-release.yml workflow_dispatch 由来) 時の stable release upload。
  # tag は既に push 済み、build 済みなので同一 run の artifact を DL + rename + upload。
  release-stable:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: alcapp-nsis
          path: nsis

      - name: Rename NSIS with v tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd nsis
          for f in *.exe; do
            new="${f/_0.1.0_/_${TAG}_}"
            mv "$f" "$new"
            echo "renamed: $f -> $new"
          done

      - name: Create stable release with NSIS
        uses: softprops/action-gh-release@v2
        with:
          files: nsis/*.exe
          generate_release_notes: true
