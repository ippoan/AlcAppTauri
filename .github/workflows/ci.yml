name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'dev-*'
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Windows: fmt + tauri build (NSIS)。clippy/test は Bazel Linux job に委譲。
  build:
    runs-on: windows-latest
    permissions:
      contents: write # tag push 時に GitHub Release へ upload するため
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # sccache は incremental compile と非互換 (有効だと bypass 警告)。
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo workspace は repo root (target/ も root 直下)。
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm install

      - name: Format check
        run: cargo fmt --check

      - name: Build Tauri bundle (NSIS)
        run: npm run build

      - name: Upload installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: alcapp-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # tag push (v* / dev-*) の時は GitHub Release にも NSIS を upload。
      # dev-* (dash 含む) は prerelease に、v* は stable release に振る。
      # dev-release.yml (main push → dev-N tag) と tag-release.yml
      # (workflow_dispatch → v{semver} tag) の 2 系統から発火する。
      - name: Upload NSIS to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # Linux Bazel: rust-only lint/test を target 単位で並列実行。
  # rust_clippy_aspect + 独立 rust_test target が disk-cache を共有し、
  # 2 回目以降は差分のみチェック。過去の Tauri × Bazel probe 知見は git 履歴参照
  # (Probe A/B/C/D: tauri 本体は build.rs 配線 + cargo:dev instruction で頓挫、
  # Tauri issue #12367 で非 cargo build system は未サポート)。
  bazel-parallel-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_BAZEL_REPIN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: "alcapptauri-bazel-probe"
          external-cache: true
          repository-cache: true

      - name: Generate Cargo.lock (crate_universe input)
        run: cargo generate-lockfile

      - name: "bazel test //crates/alc-config/... (3 target 並列)"
        id: bazel_test
        run: |
          bazel test //crates/alc-config/... \
            --test_output=errors \
            --test_summary=short \
            --verbose_failures

      - name: "bazel build --config=clippy (rust_clippy_aspect で並列適用)"
        id: bazel_clippy
        run: |
          bazel build --config=clippy //crates/alc-config/... \
            --verbose_failures

      - name: 結果サマリ
        if: always()
        run: |
          {
            echo "## Bazel 並列 test + clippy (crates/alc-config)"
            echo ""
            echo "- bazel test (3 rust_test target 並列): ${{ steps.bazel_test.outcome }}"
            echo "- bazel build --config=clippy (rust_clippy_aspect): ${{ steps.bazel_clippy.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Windows build と Linux bazel test/clippy の両方が green になったら
  # squash merge を queue する。片方 fail なら auto-merge は走らない。
  auto-merge:
    needs: [build, bazel-parallel-test]
    if: github.event_name == 'pull_request'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    secrets: inherit
