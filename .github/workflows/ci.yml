name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm install

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundle (NSIS)
        run: npm run build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: alcapp-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # CI (build) が green になったら squash merge を queue する。
  # deploy 系 job が無いので needs は build のみ。build 完走を待ってから
  # queue するため CI green 前 merge は起きない (ci-workflows auto-merge.yml)。
  auto-merge:
    needs: [build]
    if: github.event_name == 'pull_request'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    secrets: inherit
