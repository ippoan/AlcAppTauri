name: Bazel Probe

# Cargo workspace 化に伴い、Bazel の並列 test を実演するリファレンス CI
# (Refs #1)。crates/alc-config は tauri 非依存の純粋 Rust ロジックなので
# rules_rust の素の rust_library / rust_test で完結する。
#
# 過去の実測知見 (履歴として保持):
# - Probe A (config crate を bazel test) = success
# - Probe B (tauri crate 本体を素の rust_library) = failure (tauri.conf.json not found)
# - Probe C (compile_data 配線) = failure (OUT_DIR not set / build.rs 未実行)
# - Probe D (cargo_build_script 配線) = failure (DEP_TAURI_DEV env var 欠落、
#   tauri-build v2.6.3 の "missing cargo:dev instruction" panic)
# 詳細は Tauri issue #12367 / rules_rust crate_universe の annotation 議論参照。
# 本 workflow は Probe A の系譜を workspace + 並列 test 形式に発展させたもの。

on:
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'MODULE.bazel'
      - 'BUILD.bazel'
      - '.bazelversion'
      - '.github/workflows/bazel-probe.yml'

permissions:
  contents: read

jobs:
  bazel-parallel-test:
    name: Bazel parallel test (alc-config)
    runs-on: ubuntu-latest
    env:
      CARGO_BAZEL_REPIN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: "alcapptauri-bazel-probe"
          external-cache: true
          repository-cache: true

      - name: Generate Cargo.lock (crate_universe input)
        run: cargo generate-lockfile

      # bazel test は独立 test target を並列実行する (.bazelrc の
      # --jobs=auto がデフォルト)。crates/alc-config には 3 つの独立 rust_test
      # target (unit + 2 integration) があるので、この 1 コマンドで並列実行される。
      # --test_summary=short で並列実行の様子が見える (PASSED (0.Xs) を各 target 分)。
      - name: "bazel test //crates/alc-config/... (並列実行)"
        id: bazel_test
        run: |
          bazel test //crates/alc-config/... \
            --test_output=errors \
            --test_summary=short \
            --verbose_failures

      - name: 結果サマリ
        if: always()
        run: |
          {
            echo "## Bazel 並列 test 結果 (crates/alc-config)"
            echo ""
            echo "3 つの独立 rust_test target (unit / url_scenarios / retry_scenarios) を"
            echo "\`bazel test //crates/alc-config/...\` で並列実行。"
            echo ""
            echo "- outcome: ${{ steps.bazel_test.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
